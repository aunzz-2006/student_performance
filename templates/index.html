<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="main">
    <div class="card">

        <h1>🎓 Performance Predictor</h1>
        <p class="subtitle">AI-based student analysis system</p>

        <!-- 🔹 Single Prediction -->
        <form action="/predict" method="post">

            <div class="input-group">
                <label>Study Hours</label>
                <input type="number" step="any" name="hours" placeholder="e.g. 5" required>
            </div>

            <div class="input-group">
                <label>Attendance (%)</label>
                <input type="number" step="any" name="attendance" placeholder="e.g. 75" required>
            </div>

            <div class="input-group">
                <label>Previous Marks</label>
                <input type="number" step="any" name="previous" placeholder="e.g. 60" required>
            </div>

            <div class="input-group">
                <label>Sleep Hours</label>
                <input type="number" step="any" name="sleep" placeholder="e.g. 7" required>
            </div>

            <div class="input-group">
                <label>Assignments Completed</label>
                <input type="number" step="any" name="assignments" placeholder="e.g. 4" required>
            </div>
            <div class="input-group">
    <label>Extra Classes (0/1)</label>
    <input type="number" name="extra" required>
</div>

<div class="input-group">
    <label>Internet Access (0/1)</label>
    <input type="number" name="internet" required>
</div>

<div class="input-group">
    <label>Parent Education (1-3)</label>
    <input type="number" name="parent" required>
</div>

<div class="input-group">
    <label>Study Environment (1-3)</label>
    <input type="number" name="env" required>
</div>

            <button type="submit">🚀 Predict Performance</button>
        </form>

        <!-- 🔥 RESULT -->
        {% if result %}
        <div class="result 
            {% if result=='Good' %}good
            {% elif result=='Average' %}avg
            {% else %}poor{% endif %}">
            
            <h2>{{ result }}</h2>
            {% if confidence %}
            <p>Confidence: {{ confidence }}%</p>
            {% endif %}
        </div>
        {% endif %}

        <!-- 🔹 Divider -->
        <div class="divider">OR</div>

        <!-- 🔹 Bulk Upload -->
        <div class="upload-section">
            <h3>📁 Bulk Prediction</h3>

            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit">Upload CSV</button>
            </form>
        </div>

    </div>
</div>

<!-- 🔥 TABLE OUTPUT -->
{% if tables %}
<div class="table-container">
    {{ tables[0]|safe }}
</div>
{% endif %}

</body>
</html>
